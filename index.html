<!DOCTYPE html>
<html>
<head>
  <title>Task Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .task-list { list-style: none; padding: 0; }
    .task { padding: 10px; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; align-items: center; }
    .task-buttons { gap: 10px; }
    button { padding: 6px 10px; cursor: pointer; }
    .completed { text-decoration: line-through; }
  </style>
</head>
<body>
  <h1>Task Tracker</h1>
  <input type="text" id="taskInput" placeholder="Enter task title" />
  <button id="addTask">Add Task</button>
  <br />
  <ul id="taskList" class="task-list"></ul>

  <script>
    const taskInput = document.getElementById('taskInput');
    const addTaskButton = document.getElementById('addTask');
    const taskList = document.getElementById('taskList');

    const BASE_URL = 'http://localhost:3000';

    async function fetchTasks() {
      try {
        const response = await fetch(`${BASE_URL}/tasks`);
        const tasks = await response.json();
        renderTasks(tasks);
      } catch (error) {
        console.error('Error fetching tasks:', error);
      }
    }

    function renderTasks(tasks) {
      taskList.innerHTML = '';
      tasks.forEach(task => {
        const li = document.createElement('li');
        li.className = `task ${task.status === 'completed' ? 'completed' : ''}`;
        li.innerHTML = {
          title: task.title,
          buttons: task.status === 'completed' ? '' : `<button class="task-buttons">Complete</button>`,
          delete: `<button class="task-buttons">Delete</button>`
        };
        li.onclick = () => { task.status = 'completed'; renderTasks(tasks); };
        taskList.appendChild(li);
      });
    }

    addTaskButton.onclick = () => {
      const title = taskInput.value.trim();
      if (!title) return;

      fetch(`${BASE_URL}/tasks`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      }).then(response => response.json()).then(task => {
        taskInput.value = '';
        fetchTasks();
      }).catch(error => console.error('Error adding task:', error));
    };
  </script>
</body>
</html>
