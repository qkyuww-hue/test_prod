<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; } 
    .task { display: flex; justify-content: space-between; padding: 10px; border: 1px solid #ccc; }
    button { margin-left: 10px; }
  </style>
</head>
<body>
  <h1>Task Tracker</h1>
  <input type="text" id="taskInput" placeholder="Enter task..." style="width: 250px;" />
  <button id="addTask">Add Task</button>
  <br><br>
  <div id="taskList"></div>

  <script>
    const taskInput = document.getElementById('taskInput');
    const addTaskBtn = document.getElementById('addTask');
    const taskList = document.getElementById('taskList');

    // Load tasks from backend
    async function loadTasks() {
      try {
        const response = await fetch('http://localhost:3000/tasks');
        const tasks = await response.json();
        taskList.innerHTML = '';
        tasks.forEach(task => {
          const taskElement = document.createElement('div');
          taskElement.className = 'task';
          taskElement.textContent = task.title;
          
          // Complete button
          const completeBtn = document.createElement('button');
          completeBtn.textContent = 'Complete';
          taskElement.appendChild(completeBtn);
          
          // Delete button
          const deleteBtn = document.createElement('button');
          deleteBtn.textContent = 'Delete';
          taskElement.appendChild(deleteBtn);
          
          taskList.appendChild(taskElement);
        });
      } catch (error) {
        console.error('Error loading tasks:', error);
      }
    }

    addTaskBtn.addEventListener('click', async () => {
      const taskText = taskInput.value.trim();
      if (!taskText) return;

      try {
        const response = await fetch('http://localhost:3000/tasks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: taskText, status: 'todo' })
        });
        const newTask = await response.json();
        loadTasks();
        taskInput.value = '';
      } catch (error) {
        console.error('Error adding task:', error);
      }
    });

    // Initial load
    loadTasks();
  </script>
</body>
</html>
